services:
  - type: web
    name: vietdurian-websocket
    runtime: node
    plan: starter          # upgrade to standard for production
    region: singapore      # closest to Vietnam
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false        # set manually in Render dashboard (secret)
      - key: ALLOWED_ORIGINS
        sync: false        # set manually: your Vercel frontend URL
